# ============================================================
# zensical.toml (ALL-COURSE-PY-SRC-REPOS)
# ============================================================

[project]
site_name = "Sandra Otubushin - Regression Project"
site_url = "https://sandra8918.github.io/ml-04-regression/"
repo_url = "https://github.com/sandra8918/ml-04-regression"
repo_name = "ml-04-regression"
site_description = "Regression Analysis Project Documentation"
docs_dir = "docs"
site_dir = "site"
edit_uri = "edit/main/docs/"

[project.extra]
social = [
    { icon = "fontawesome/brands/github", link = "https://github.com/sandra8918/ml-04-regression" },
]

# ------------------------------------------------------------
# Plugins
# ------------------------------------------------------------

[project.plugins.search]
lang = "en"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_source = true
show_root_heading = true
show_root_toc_entry = true
show_signature_annotations = true
separate_signature = true

[project.theme]
features = [
    "navigation.tracking",
    "navigation.expand",
    "navigation.path",
    "navigation.prune",
    "navigation.indexes",
    "toc.follow",
    "toc.integrate",
    "navigation.top",
]
